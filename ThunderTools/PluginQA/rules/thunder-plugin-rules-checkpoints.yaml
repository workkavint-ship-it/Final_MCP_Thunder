          ASSERT(service != nullptr);  // ✓ Found at line 110
          ...
      }
    reasoning: "Extracted Initialize body, found ASSERT as first statement"
    
  example_fail:
    checkpoint_id: "lifecycle_4_1"
    status: "FAIL"
    question: "Is the first statement in Initialize() body 'ASSERT(service != nullptr);'?"
    answer: "No"
    extracted_code: |
      const string Initialize(IShell* service) {
          _config.FromString(service->ConfigLine());  // Line 108
          ...
      }
    violation_line: 108
    citation: "[Dictionary.cpp:108] Initialize missing ASSERT(service != nullptr) at start"
    fix: |
      const string Initialize(IShell* service) {
          ASSERT(service != nullptr);  // Add this first
          _config.FromString(service->ConfigLine());
      }
    reasoning: "Extracted Initialize, first statement is FromString not ASSERT, violation confirmed"
    
